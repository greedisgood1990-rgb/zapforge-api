name: Apply code review fixes

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/code-review-reliability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Detect staged review
        id: staged
        run: |
          if [ -f .zapforge-review/apply_review_fixes.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply review fixes
        if: steps.staged.outputs.apply == 'true'
        run: python3 .zapforge-review/apply_review_fixes.py

      - name: Install dependencies
        if: steps.staged.outputs.apply == 'true'
        run: npm install --no-audit --no-fund

      - name: Run build and regression tests
        if: steps.staged.outputs.apply == 'true'
        run: npm test

      - name: Validate diff
        if: steps.staged.outputs.apply == 'true'
        run: git diff --check

      - name: Commit reviewed code
        if: steps.staged.outputs.apply == 'true'
        run: |
          git config user.name "zapforge-review"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix: stabilize pairing reconnect and interactive delivery"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
