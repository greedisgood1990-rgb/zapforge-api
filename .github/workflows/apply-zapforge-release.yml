name: Apply ZapForge release

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Assemble release
        run: |
          test -d .zapforge-release
          cat .zapforge-release/part-* > /tmp/zapforge-v1.2.zip
          mkdir -p /tmp/zapforge-release
          unzip -q /tmp/zapforge-v1.2.zip -d /tmp/zapforge-release

      - name: Apply release
        run: |
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/apply-zapforge-release.yml' \
            /tmp/zapforge-release/ ./
          rm -rf .zapforge-release
          rm -f .github/workflows/apply-zapforge-release.yml

      - name: Commit release
        run: |
          git config user.name "zapforge-release"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: harden session pairing and interactive delivery [release-applied]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
