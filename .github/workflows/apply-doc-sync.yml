name: Apply documentation synchronization

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/code-review-reliability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Detect staged documentation patch
        id: staged
        run: |
          if [ -f .zapforge-review/sync_docs.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Synchronize OpenAPI and documentation
        if: steps.staged.outputs.apply == 'true'
        run: python3 .zapforge-review/sync_docs.py

      - name: Install dependencies
        if: steps.staged.outputs.apply == 'true'
        run: npm install --no-audit --no-fund

      - name: Validate code and documentation diff
        if: steps.staged.outputs.apply == 'true'
        run: |
          npm test
          git diff --check
          grep -q 'version: 1.2.1' openapi.yaml
          grep -q 'disableFallback:' openapi.yaml

      - name: Commit synchronized documentation
        if: steps.staged.outputs.apply == 'true'
        run: |
          git config user.name "zapforge-review"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "docs: synchronize interactive list contract"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
